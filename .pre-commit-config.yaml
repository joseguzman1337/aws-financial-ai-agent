exclude: ^(node_modules/|\.mypy_cache/|\.terraform/|\.docker-colima/|\.docker/|package-lock\.json)
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=2000']

  - repo: local
    hooks:
      - id: black
        name: black
        entry: black -l 79
        language: system
        types: [python]

      - id: isort
        name: isort
        entry: isort
        language: system
        types: [python]

      - id: ruff
        name: ruff
        entry: ruff check --fix
        language: system
        types: [python]

      - id: flake8
        name: flake8
        entry: flake8 --max-line-length=79
        language: system
        types: [python]

      - id: pylint
        name: pylint
        entry: pylint --disable=import-error,broad-exception-caught
        language: system
        types: [python]

      - id: mypy
        name: mypy
        entry: mypy --ignore-missing-imports
        language: system
        types: [python]

      - id: checkov
        name: checkov
        entry: checkov --quiet
        language: system
        files: \.(tf|Dockerfile)$

      - id: tflint
        name: tflint
        entry: tflint
        language: system
        files: \.tf$

      - id: terrascan
        name: terrascan
        entry: terrascan scan -i terraform
        language: system
        files: \.tf$

      - id: kics
        name: kics
        entry: kics scan --queries-path /opt/homebrew/opt/kics/share/kics/assets/queries --no-progress --fail-on HIGH,CRITICAL -p
        language: system
        files: \.(tf|Dockerfile)$

      - id: trivy
        name: trivy
        entry: trivy fs --quiet
        language: system
        files: \.(tf|Dockerfile|txt|py)$

      - id: grype
        name: grype
        entry: grype --quiet
        language: system
        files: ^(docker/requirements\.txt|docker/Dockerfile)$

      - id: snyk
        name: snyk
        entry: snyk test
        language: system
        pass_filenames: false

      - id: infracost
        name: infracost
        entry: infracost breakdown --path terraform/
        language: system
        pass_filenames: false
